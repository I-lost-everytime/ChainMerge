[package]
name = "chainmerge-core"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "chainmerge"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
tower-http = { version = "0.5", features = ["cors"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
reqwest = { version = "0.12", features = ["json"] }
async-trait = "0.1"
dotenv = "0.15"